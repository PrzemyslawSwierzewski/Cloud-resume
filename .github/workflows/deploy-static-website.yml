name: Blob Storage Website CI

on:
  push:
    branches: [ main ]
    paths:
      - 'modules/static_site/**'

jobs:
  deploy-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_RBAC_CREDENTIALS }}

      - name: Upload static site files
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Upload all files in the static_site folder only
            az storage blob upload-batch \
                --account-name stresstatic \
                --auth-mode key \
                -d '$web' \
                -s ./modules/static_site \
                --pattern index.html, *.png, *.jpg \
                --overwrite

      - name: Purge CDN endpoint
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az cdn endpoint purge \
              --content-paths "/*" \
              --profile-name "CDN_PROFILE_NAME" \
              --name "CDN_ENDPOINT" \
              --resource-group "RESOURCE_GROUP"

      - name: Azure Logout
        if: always()
        run: az logout